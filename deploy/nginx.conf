# Ganti YOURDOMAIN.COM dengan domain kamu
server {
    listen 80;
    server_name YOURDOMAIN.COM;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name YOURDOMAIN.COM;

    # SSL — diisi otomatis oleh certbot
    # ssl_certificate ...
    # ssl_certificate_key ...

    # Basic Auth untuk dashboard (proteksi dari publik)
    auth_basic "Polybot Dashboard";
    auth_basic_user_file /etc/nginx/.polybot_htpasswd;

    # Khusus endpoint EA tidak pakai auth (EA tidak bisa kirim basic auth)
    location /ea/ {
        auth_basic off;

        # Whitelist IP — hanya terima dari IP Windows PC kamu
        # allow YOUR_PC_IP;
        # deny all;

        proxy_pass http://127.0.0.1:47302;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Dashboard & monitoring endpoints — pakai auth
    location / {
        proxy_pass http://127.0.0.1:47302;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
