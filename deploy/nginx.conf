server {
    listen 80;
    server_name polybot.mssmart.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name polybot.mssmart.id;

    # SSL — diisi otomatis oleh certbot
    # ssl_certificate /etc/letsencrypt/live/polybot.mssmart.id/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/polybot.mssmart.id/privkey.pem;

    # Basic Auth untuk dashboard
    auth_basic "Polybot Dashboard";
    auth_basic_user_file /etc/nginx/.polybot_htpasswd;

    # Endpoint EA — tanpa auth, EA MT5 tidak bisa kirim Basic Auth
    location /ea/ {
        auth_basic off;
        proxy_pass http://127.0.0.1:47302;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    # Dashboard & API
    location / {
        proxy_pass http://127.0.0.1:47302;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}
